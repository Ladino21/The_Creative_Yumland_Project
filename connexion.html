<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="stylesheet" href="restaurant.css">
<title>Formulaire de connexion</title>

</head>
<body id="body_connexion">
<section id="section_form">
	<div id="container">
		<h2>Formulaire de connexion</h2>
		<form action="redirection.py" method="post" id="form_connexion">
		<table id="tab_connexion">
			<tr>
				<td><label for="Email">Email</label></td>
				<td><input type="text" placeholder="Email"name="email" id="Email"/></td>
			</tr>
			<tr>
				<td><label for="password">Mot de passe</label></td>
				<td><input type="text" placeholder="Mot de passe" name="password" id="password"/></td>
			</tr>
			<tr>
				<td><label for="remind_me">Se souvenir de moi</label></td>
				<td><input type="checkbox" name="forgot_password" id="remind_me"/></td>
			</tr>
			<tr>
				<td>
					<button type="submit">Mot de passe oublié ?</button>
				</td>
			</tr>
		</table>
	</div>
</section>

</body>
</html>
