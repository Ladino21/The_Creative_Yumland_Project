<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="stylesheet" href="restaurant.css">
<title>The Wonders of Svaneti |Formulaire d'inscription</title>
</head>
<body id="body_inscription">
<section id="section_inscription">
	<div id="container_form">
		<h2>Formulaire d'inscription</h2>
		<form action="#" method="post" id="form_inscription">
		<table id="tab_inscription">
			<tr>
				<td><label for="name">Surnom</label></td>
				<td><input type="text"placeholder="Name"name="name" id="name"/></td>
			</tr>
			<tr>
				<td><label for="surname">Nom</label></td>
				<td><input type="text" placeholder="Surname" name="surname" id="surname"/></td>
			</tr>
			<tr>
				<td><label for="Email2">Email</label></td>
				<td><input type="email" placeholder="Email"name="email" id="Email2"/></td>
			</tr>
			<tr>
				<td><label for="password_ins">Mot de passe</label></td>
				<td><input type="password" placeholder="Mot de passe" name="password" id="password_ins"/></td>
			</tr>
			<tr>
				<td><label for="password_conf">Confirmation mot de passe</label></td>
				<td><input type="password" placeholder="Mot de passe" name="password_conf" id="password_conf"/></td>
			</tr>
			<tr>
				<td><label for="address">Address</label></td>
				<td><input type="text" placeholder="Address" name="address" id="address"/></td>
			</tr>
			<tr>
				<td><label for="phone">Phone</label></td>
				<td><input type="tel" placeholder="Phone number" name="phone" id="phone"/></td>
			</tr>
			<tr>
				<td><label for="birthday">Date d'anniversaire</label></td>
				<td><input type="date" name="birthday" id="birthday"/></td>
			</tr>
			<tr>
				<td><label for="info">Informations complémentaires <sup>*</sup></label></td>
				<td>
					<textarea name="info_complementaires" id="info" placeholder="Étage, code interphone..."></textarea>
				</td>
			</tr>
			<tr>
    			<td colspan="2">
       				<button type="submit">S'inscrire</button>
    			</td>
			</tr>
		</table>
		</form>
	</div>
</section>
</body>
</html>
